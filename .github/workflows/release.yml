name: Release

# Publish to PyPI when a version tag is pushed.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Auth is via PyPI Trusted Publishing (OIDC) — no API token is stored in the
# repo. The one-time setup is documented in RELEASING.md: add a trusted
# publisher on pypi.org pointing at this repo + workflow (release.yml) +
# environment (pypi).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          import os, sys, tomllib
          tag = os.environ["GITHUB_REF_NAME"]            # e.g. v0.2.0
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              sys.exit(
                  f"::error::Tag {tag!r} does not match pyproject version "
                  f"{version!r} (expected tag {expected!r}). Bump "
                  f"project.version and re-tag."
              )
          print(f"OK: tag {tag} matches pyproject version {version}")
        shell: python

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Sanity-check that bundled modules shipped in the wheel
        run: |
          import glob, os, sys, zipfile
          from pathlib import Path

          # Enumerate the expected set of bundled files from the source
          # tree: every module.yaml plus every file under each module's
          # scripts/ dir. We compare these exactly against the wheel
          # contents so a single dropped file (e.g. a missing script, or
          # a module that lost its yaml) fails the release — not just the
          # "no module.yaml at all" case.
          src_root = Path("src/superpos_agent_core/modules")
          if not src_root.is_dir():
              sys.exit(f"::error::Source modules dir not found: {src_root}")

          expected: set[str] = set()
          module_dirs = sorted(p for p in src_root.iterdir() if p.is_dir())
          if not module_dirs:
              sys.exit(f"::error::No module directories under {src_root}")

          for mod_dir in module_dirs:
              yaml_path = mod_dir / "module.yaml"
              if not yaml_path.is_file():
                  sys.exit(
                      f"::error::Source module {mod_dir.name!r} is missing "
                      f"module.yaml at {yaml_path} — fix the source tree."
                  )
              # Wheel paths are POSIX, rooted at the package name.
              rel = yaml_path.relative_to("src").as_posix()
              expected.add(rel)

              scripts_dir = mod_dir / "scripts"
              if scripts_dir.is_dir():
                  for script in scripts_dir.iterdir():
                      if script.is_file():
                          expected.add(script.relative_to("src").as_posix())

          whl_matches = glob.glob("dist/*.whl")
          if not whl_matches:
              sys.exit("::error::No wheel found in dist/")
          whl = whl_matches[0]
          with zipfile.ZipFile(whl) as zf:
              names = set(zf.namelist())

          missing = sorted(expected - names)
          if missing:
              print("::error::Wheel is missing expected bundled module files:")
              for n in missing:
                  print(f"  - {n}")
              print(
                  "Fix the [tool.setuptools.package-data] globs in "
                  "pyproject.toml so every module.yaml and scripts/* "
                  "ships in the wheel."
              )
              sys.exit(1)

          print(f"OK: all {len(expected)} expected bundled files present in {os.path.basename(whl)}:")
          for n in sorted(expected):
              print(f"  {n}")
        shell: python

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, never for manual workflow_dispatch
    # dry-runs (which build but must not release).
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/superpos-agent-core/
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
