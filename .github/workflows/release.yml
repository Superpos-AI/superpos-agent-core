name: Release

# Publish to PyPI when a version tag is pushed.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Auth is via PyPI Trusted Publishing (OIDC) — no API token is stored in the
# repo. The one-time setup is documented in RELEASING.md: add a trusted
# publisher on pypi.org pointing at this repo + workflow (release.yml) +
# environment (pypi).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          import os, sys, tomllib
          tag = os.environ["GITHUB_REF_NAME"]            # e.g. v0.2.0
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              sys.exit(
                  f"::error::Tag {tag!r} does not match pyproject version "
                  f"{version!r} (expected tag {expected!r}). Bump "
                  f"project.version and re-tag."
              )
          print(f"OK: tag {tag} matches pyproject version {version}")
        shell: python

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Sanity-check that bundled modules shipped in the wheel
        run: |
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          # Every bundled module must carry its module.yaml into the wheel,
          # otherwise discover_modules() finds nothing at runtime.
          yamls = [n for n in names if n.endswith("module.yaml")]
          if not yamls:
              sys.exit("::error::No module.yaml files found in wheel — "
                       "package-data glob for modules/** is broken.")
          print("Bundled modules in wheel:")
          for n in sorted(yamls):
              print(" ", n)
        shell: python

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, never for manual workflow_dispatch
    # dry-runs (which build but must not release).
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/project/superpos-agent-core/
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
